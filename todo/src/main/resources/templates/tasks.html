<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo Application</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center text-bold mb-4">Todo Application</h1>

    <!-- Create Task Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form action="/create" method="post" class="row g-3">
                <div class="col-9">
                    <input type="text"
                           class="form-control"
                           name="name"
                           placeholder="Enter title..."
                           required>
                </div>
                <div class="col-3 d-grid">
                    <button type="submit" class="btn btn-primary">
                        Add Task
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task List -->
    <div th:each="task : ${tasks}" class="card mb-2">
        <div class="card-body d-flex justify-content-between align-items-center">

            <!-- Task Name -->
            <span th:text="${task.name}"
                  th:classappend="${task.completed} ? 'text-danger' : 'text-success'">
                Task title
            </span>

            <!-- Action Buttons -->
            <div class="d-flex gap-2">

                <!-- Toggle -->
                <form th:action="@{/{id}/toggle(id=${task.id})}" method="post">
                    <button class="btn btn-sm btn-warning">
                        Toggle
                    </button>
                </form>

                <!-- Delete -->
                <form th:action="@{/{id}/delete(id=${task.id})}" method="post">
                    <button class="btn btn-sm btn-danger">
                        Delete
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
